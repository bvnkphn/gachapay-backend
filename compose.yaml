services:
  gachapay-member-api:
    image: gachapay-member-api
    container_name: gachapay-member-api
    build:
      context: .
      dockerfile: ./Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
    depends_on:
      postgres-db:
        condition: service_healthy
    ports:
      - "8000:8000"

  postgres-db:
    image: postgres:18-alpine
    container_name: postgres-db
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-gachapay}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-game_topup_db}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gachapay} -d ${POSTGRES_DB:-game_topup_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
