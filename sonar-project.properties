# Unique key and name for the project on SonarQube
sonar.projectKey=gachapay-backend
sonar.projectName=Gachapay-Backend
sonar.projectVersion=1.0

# Path to source directories
sonar.sources=src

# Exclude dependencies, build outputs, and tests from analysis
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts,**/*.spec.tsx,**/*.spec.js,**/*.spec.jsx,**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Paths to LCOV test coverage reports
sonar.javascript.lcov.reportPaths=coverage/lcov.info