services:
  gachapay-member-api:
    image: gachapay-member-api
    container_name: gachapay-member-api
    build:
      context: .
      dockerfile: ./Dockerfile
    env_file:
      - .env
    ports:
      - 8000:8000

  postgres-db:
    image: postgres:18-alpine
    container_name: postgres-db
    env_file:
      - .env
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
